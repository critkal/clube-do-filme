    <script>
      // Restore deep links redirected by GitHub Pages 404.html for SPA routing.
      (function () {
        var redirect = window.location.search.match(/[?&]p=([^&]+)/);
        if (!redirect) return;

        var path = decodeURIComponent(redirect[1]).replace(/~and~/g, '&');
        var query = window.location.search.replace(/\??p=[^&]*/, '').replace(/^&/, '?');
        var hash = window.location.hash || '';
        window.history.replaceState(null, null, path + query + hash);
      })();
    </script>
