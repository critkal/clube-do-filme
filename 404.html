<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect unknown routes to index.html while preserving full SPA path.
      (function () {
        var l = window.location;
        var path = l.pathname + l.search + l.hash;
        var encodedPath = path.replace(/&/g, '~and~');
        l.replace('/clube-do-filme/?p=' + encodeURIComponent(encodedPath));
      })();
    </script>
  </head>
  <body></body>
</html>
